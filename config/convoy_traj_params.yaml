convoy_traj_node:
  ros__parameters:
    # Camera and tag frames
    camera_frame_id: "zed_left_camera_optical_frame"
    tag0_frame_id: "tag36h11:0"
    tag1_frame_id: "tag36h11:1"
    
    # Filtering parameters
    alpha: 0.8  # Smoothing factor (0.0 < alpha <= 1.0). Higher = less smoothing, more responsive
    
    # Front axes offset (translation from front_vehicle to front_axes)
    # Adjust these values based on your vehicle geometry
    axes_offset_x: 1.5  # Forward offset in meters (positive = forward)
    axes_offset_y: 0.0  # Lateral offset in meters (positive = left)
    axes_offset_z: 0.0  # Vertical offset in meters (positive = up)
